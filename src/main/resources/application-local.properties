spring.datasource.url=${IBERIA2084_DB_URL:jdbc:mariadb://localhost:3306/iberia2084}
spring.datasource.username=${IBERIA2084_DB_USER:iberia2084}
spring.datasource.password=${IBERIA2084_DB_PASSWORD:iberia2084}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=${IBERIA2084_FLYWAY_VALIDATE_ON_MIGRATE:false}
