spring.datasource.url=${IBERIA2084_DB_URL}
spring.datasource.username=${IBERIA2084_DB_USER}
spring.datasource.password=${IBERIA2084_DB_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

server.forward-headers-strategy=framework

spring.mail.host=${IBERIA2084_SMTP_HOST:127.0.0.1}
spring.mail.port=${IBERIA2084_SMTP_PORT:25}
spring.mail.username=${IBERIA2084_SMTP_USERNAME:}
spring.mail.password=${IBERIA2084_SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${IBERIA2084_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${IBERIA2084_SMTP_STARTTLS:false}
spring.mail.properties.mail.smtp.connectiontimeout=${IBERIA2084_SMTP_CONNECTION_TIMEOUT_MS:5000}
spring.mail.properties.mail.smtp.timeout=${IBERIA2084_SMTP_TIMEOUT_MS:8000}
spring.mail.properties.mail.smtp.writetimeout=${IBERIA2084_SMTP_WRITE_TIMEOUT_MS:8000}
spring.mail.properties.mail.smtp.from=${IBERIA2084_SMTP_ENVELOPE_FROM:no-reply@iberia2084.com}
spring.mail.properties.mail.smtp.localhost=${IBERIA2084_SMTP_LOCALHOST:mail.iberia2084.com}

iberia2084.frontend-base-url=${IBERIA2084_FRONTEND_BASE_URL:https://iberia2084.com}
iberia2084.mail.from=${IBERIA2084_SMTP_FROM:no-reply@iberia2084.com}
iberia2084.mail.from-name=${IBERIA2084_SMTP_FROM_NAME:Iberia 2084}
iberia2084.mail.reply-to=${IBERIA2084_SMTP_REPLY_TO:no-reply@iberia2084.com}
iberia2084.mail.contact-to=${IBERIA2084_CONTACT_TO:JarvanXII@gmail.com}
iberia2084.auth.signup.code-ttl-minutes=${IBERIA2084_SIGNUP_CODE_TTL_MINUTES:15}
iberia2084.auth.signup.max-attempts=${IBERIA2084_SIGNUP_MAX_ATTEMPTS:5}
iberia2084.auth.password-recovery.token-ttl-minutes=${IBERIA2084_RECOVERY_TOKEN_TTL_MINUTES:30}
iberia2084.auth.password-recovery.max-attempts=${IBERIA2084_RECOVERY_MAX_ATTEMPTS:5}
iberia2084.bots.seed-enabled=${IBERIA2084_BOTS_SEED_ENABLED:false}
